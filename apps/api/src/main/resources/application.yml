spring:
  application:
    name: ai-knowledge-hub-api
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15432}/${DB_NAME:assistops}
    username: ${DB_USERNAME:assistops}
    password: ${DB_PASSWORD:assistops}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  ai:
    model:
      chat: ollama
      embedding: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:llama3.2}
          num-predict: ${OLLAMA_CHAT_NUM_PREDICT:256}
          temperature: ${OLLAMA_CHAT_TEMPERATURE:0.2}
          top-p: ${OLLAMA_CHAT_TOP_P:0.9}
          keep-alive: ${OLLAMA_CHAT_KEEP_ALIVE:30m}
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    db:
      enabled: true

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    secret: ${JWT_SECRET:dev-only-local-secret-change-me-this-string-is-for-local-development-only}
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:60}

storage:
  minio:
    enabled: ${MINIO_ENABLED:true}
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:assistops}
    secret-key: ${MINIO_SECRET_KEY:assistops123}
    bucket: ${MINIO_BUCKET:assistops-documents}
    region: ${MINIO_REGION:us-east-1}

rag:
  embedding:
    model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    dimension: 768
  generation:
    chat-model: ${OLLAMA_CHAT_MODEL:llama3.2}
    default-top-k: ${RAG_DEFAULT_TOP_K:3}
    min-top-k: ${RAG_MIN_TOP_K:1}
    max-top-k: ${RAG_MAX_TOP_K:8}
    context-chunk-max-chars: ${RAG_CONTEXT_CHUNK_MAX_CHARS:800}
    context-total-max-chars: ${RAG_CONTEXT_TOTAL_MAX_CHARS:3000}
    num-predict: ${OLLAMA_CHAT_NUM_PREDICT:256}
    temperature: ${OLLAMA_CHAT_TEMPERATURE:0.2}
    top-p: ${OLLAMA_CHAT_TOP_P:0.9}
    keep-alive: ${OLLAMA_CHAT_KEEP_ALIVE:30m}
